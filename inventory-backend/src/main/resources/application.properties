spring.application.name=inventory-service
server.port=${PORT:8082}
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEYSTORE:}
server.ssl.key-store-password=${SERVER_SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEYSTORE_TYPE:PKCS12}

# Security - Enable compression and disable trace
server.compression.enabled=true
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Database Configuration (uses Railway env vars with local fallbacks)
# IMPORTANT: Always use environment variables for credentials in production
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/dbfms?useSSL=true&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=false}
spring.datasource.username=${MYSQL_USER:}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging - Disabled DEBUG logging for security
logging.level.root=INFO
logging.level.com.supremefuneralx=INFO
logging.level.org.springframework.security=INFO

# JWT Configuration - Use environment variable in production
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
app.cors.allowedOrigins=${CORS_ORIGINS:http://localhost:8081,http://localhost:3000,https://helpful-cooperation-production-278d.up.railway.app}

