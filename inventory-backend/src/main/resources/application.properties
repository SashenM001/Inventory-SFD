spring.application.name=inventory-service
server.port=${PORT:8080}
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEYSTORE:}
server.ssl.key-store-password=${SERVER_SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEYSTORE_TYPE:PKCS12}

# Security - Enable compression and disable trace
server.compression.enabled=true
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Database Configuration
# Railway auto-injects: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# For local development: Uses localhost defaults if env vars not set
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:dbfms}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging - Disabled DEBUG logging for security
logging.level.root=INFO
logging.level.com.supremefuneralx=INFO
logging.level.org.springframework.security=INFO

# JWT Configuration - Use environment variable in production
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Spring Security Default User (for testing, use proper database in production)
spring.security.user.name=admin
spring.security.user.password=password
spring.security.user.roles=USER,ADMIN

# CORS Configuration
app.cors.allowedOrigins=${CORS_ORIGINS:http://localhost:8081,http://localhost:3000,https://helpful-cooperation-production-278d.up.railway.app}

